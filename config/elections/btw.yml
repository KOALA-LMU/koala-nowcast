id: btw
name: Bundestagswahl 2029
hashtag: "#btwwahl"

scraper:
  function: scrape_btw

parliament:
  seats: 630
  majority: 316
  hurdle: 0.05
  seat_allocation: sls

pooling:
  period: 14
  period_extended: 28

parties:
  - id: cdu
    label: Union
    color: "#000000"
    required: true
  - id: afd
    label: AfD
    color: "#82caff"
    required: true
  - id: spd
    label: SPD
    color: "#E3000F"
    required: true
  - id: greens
    label: Grüne
    color: "#46962b"
    required: true
  - id: left
    label: Linke
    color: "#ff1493"
    required: true
  - id: bsw
    label: BSW
    color: "#6d1f99"
    required: false
  - id: fdp
    label: FDP
    color: "#ffed00"
    required: false
  - id: others
    label: Sonstige
    color: "#808080"
    required: true

pollsters:
  - allensbach
  - emnid
  - forsa
  - fgw
  - gms
  - infratest
  - insa

coalitions:
  # Single-party / absolute majority checks
  - parties: [afd]
    label: "AfD"
    color: "#82caff"
  - parties: [cdu]
    label: "Union"
    color: "#000000"
  - parties: [spd]
    label: "SPD"
    color: "#E3000F"

  # Two-party coalitions
  - parties: [cdu, spd]
    label: "Union-SPD"
    color: "#000000"
  - parties: [spd, cdu]
    label: "SPD-Union"
    color: "#E3000F"
  - parties: [cdu, greens]
    label: "Union-Grüne"
    color: "#000000"
  - parties: [greens, cdu]
    label: "Grüne-Union"
    color: "#46962b"
  - parties: [cdu, afd]
    label: "Union-AfD"
    color: "#000000"
  - parties: [afd, cdu]
    label: "AfD-Union"
    color: "#82caff"
  - parties: [afd, bsw]
    label: "AfD-BSW"
    color: "#82caff"
  - parties: [bsw, afd]
    label: "BSW-AfD"
    color: "#6d1f99"

  # Three-party coalitions
  - parties: [cdu, spd, greens]
    label: "Union-SPD-Grüne"
    color: "#000000"
  - parties: [spd, cdu, greens]
    label: "SPD-Union-Grüne"
    color: "#E3000F"
  - parties: [greens, cdu, spd]
    label: "Grüne-Union-SPD"
    color: "#46962b"

  - parties: [cdu, greens, fdp]
    label: "Union-Grüne-FDP"
    color: "#000000"
  - parties: [greens, cdu, fdp]
    label: "Grüne-Union-FDP"
    color: "#46962b"
  - parties: [fdp, cdu, greens]
    label: "FDP-Union-Grüne"
    color: "#ffed00"

  - parties: [spd, greens, left]
    label: "SPD-Grüne-Linke"
    color: "#E3000F"
  - parties: [greens, spd, left]
    label: "Grüne-SPD-Linke"
    color: "#46962b"
  - parties: [left, spd, greens]
    label: "Linke-SPD-Grüne"
    color: "#ff1493"

  - parties: [spd, greens, bsw]
    label: "SPD-Grüne-BSW"
    color: "#E3000F"
  - parties: [greens, spd, bsw]
    label: "Grüne-SPD-BSW"
    color: "#46962b"
  - parties: [bsw, spd, greens]
    label: "BSW-SPD-Grüne"
    color: "#6d1f99"

  - parties: [cdu, spd, fdp]
    label: "Union-SPD-FDP"
    color: "#000000"
  - parties: [spd, cdu, fdp]
    label: "SPD-Union-FDP"
    color: "#E3000F"
  - parties: [fdp, cdu, spd]
    label: "FDP-Union-SPD"
    color: "#ffed00"

  - parties: [cdu, spd, bsw]
    label: "Union-SPD-BSW"
    color: "#000000"
  - parties: [spd, cdu, bsw]
    label: "SPD-Union-BSW"
    color: "#E3000F"
  - parties: [bsw, cdu, spd]
    label: "BSW-Union-SPD"
    color: "#6d1f99"

analyses:
  biggest_party:
    - parties: [cdu, spd, greens, left, afd]
      label: "Wer wird stärkste Kraft?"
  pass_hurdle:
    parties: [fdp, bsw]
    label: "Schaffen es die folgenden Parteien in den Bundestag?"
