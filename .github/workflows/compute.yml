name: Scrape, Pool and Compute

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 07:00 UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  compute:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

    steps:
      - uses: actions/checkout@v4

      - name: Ensure local directories exist
        run: mkdir -p data/surveys data/results

      - name: Download existing data from R2
        run: |
          aws s3 sync s3://koala-bucket/surveys data/surveys/ \
            --endpoint-url "$R2_ENDPOINT" --no-progress
          aws s3 sync s3://koala-bucket/results data/results/ \
            --endpoint-url "$R2_ENDPOINT" --no-progress

      - name: Check if results exist
        id: check_results
        run: |
          if [ -z "$(ls -A data/results 2>/dev/null)" ]; then
            echo "has_results=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_results=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Scrape and pool polls
        id: scrape
        run: |
          Rscript -e '
            source("scripts/scrape_polls.R")
            configs <- list.files("config/elections", pattern = "\\.yml$", full.names = TRUE)
            new_data <- any(sapply(configs, scrape_election))
            cat(paste0("new_data=", new_data, "\n"), file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
          '

      - name: Compute coalition probabilities
        if: steps.scrape.outputs.new_data == 'TRUE' || steps.check_results.outputs.has_results == 'false'
        run: |
          Rscript -e '
            library(coalitions); library(dplyr); library(tidyr); library(yaml); library(jsonlite)
            source("scripts/calc_coalProbs_helpers.R")
            source("scripts/calc_coalProbs.R")
            configs <- list.files("config/elections", pattern = "\\.yml$", full.names = TRUE)
            invisible(lapply(configs, calc_coalProbs))
          '

      - name: Upload data to R2
        if: steps.scrape.outputs.new_data == 'TRUE' || steps.check_results.outputs.has_results == 'false'
        run: |
          aws s3 sync data/surveys/ s3://koala-bucket/surveys \
            --endpoint-url "$R2_ENDPOINT" --delete --no-progress
          aws s3 sync data/results/ s3://koala-bucket/results \
            --endpoint-url "$R2_ENDPOINT" --delete --no-progress
