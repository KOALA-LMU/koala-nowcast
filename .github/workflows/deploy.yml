name: Deploy Website

on:
  workflow_dispatch:
    # disabled until website is implemented
    inputs:
      force:
        description: 'Set to true to force deploy'
        required: true
        default: 'false'

permissions:
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download data from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync s3://koala-bucket/surveys data/surveys/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          aws s3 sync s3://koala-bucket/results data/results/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: knitr, rmarkdown

      - name: Prepare dashboard data
        run: Rscript st-dashboard/prepare_data.R

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        run: quarto render st-dashboard/index.qmd --output-dir _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: st-dashboard/_site

      - uses: actions/deploy-pages@v4
