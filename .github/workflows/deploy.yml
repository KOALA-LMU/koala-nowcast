name: Deploy Website

on:
  workflow_dispatch:
    # disabled until website is implemented
    inputs:
      force:
        description: 'Set to true to force deploy'
        required: true
        default: 'false'

permissions:
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: knitr, rmarkdown

      - name: Prepare dashboard data
        run: Rscript st-dashboard/prepare_data.R

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        run: quarto render st-dashboard/index.qmd --output-dir _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: st-dashboard/_site

      - uses: actions/deploy-pages@v4
